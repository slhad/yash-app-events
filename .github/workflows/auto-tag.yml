name: Auto Tag on Version Bump

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml

jobs:
  detect:
    name: Detect version bump
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      bumped: ${{ steps.version.outputs.bumped }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect version bump
        id: version
        shell: bash
        run: |
          version=$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')
          previous_version=$(git show HEAD~1:Cargo.toml 2>/dev/null | python3 -c 'import sys, tomllib; print(tomllib.loads(sys.stdin.read())["workspace"]["package"]["version"])' || true)
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          if [[ "$version" != "$previous_version" ]]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create git tag
        if: steps.version.outputs.bumped == 'true'
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"

  release:
    name: Build and release
    needs: detect
    if: needs.detect.outputs.bumped == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ needs.detect.outputs.tag }}
    permissions:
      contents: write
